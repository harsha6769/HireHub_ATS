server.port=8080

spring.application.name=hirehub-ats

# Database Configuration (using MySQL on port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/hirehub_ats?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Multipart file configurations (for PDF resumes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT settings
jwt.secret=9a76a59b9c9d9e9f8a8b8c8d8e8f7a7b7c7d7e7f6a6b6c6d6e6f5a5b5c5d5e5f
jwt.expiration=86400000

# Custom path to store uploaded files
upload.path=uploads/resumes
