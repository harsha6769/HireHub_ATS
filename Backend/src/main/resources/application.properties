server.port=8080

spring.application.name=hirehub-ats

# Database Configuration (supports overrides for Render/MySQL/Aiven connection)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/hirehub_ats?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Multipart file configurations (for PDF resumes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT settings
jwt.secret=${JWT_SECRET:9a76a59b9c9d9e9f8a8b8c8d8e8f7a7b7c7d7e7f6a6b6c6d6e6f5a5b5c5d5e5f}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Custom path to store uploaded files
upload.path=${UPLOAD_PATH:uploads/resumes}

# CORS settings - dynamic origins configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,https://hirehub-ats-1.onrender.com}
